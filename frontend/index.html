<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Museum Art Gallery</title>
    <script>
      // Prevent FOUC: apply theme before CSS renders
      (function() {
        try {
          var theme = localStorage.getItem('gallery-theme');
          if (theme && (theme === 'dark' || theme === 'light')) {
            document.documentElement.setAttribute('data-theme', theme);
            return;
          }
        } catch(e) {
          // Safari Private Browsing — localStorage throws; fall through to matchMedia
        }
        // Fallback: use system preference
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
