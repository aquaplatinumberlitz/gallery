<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
<title>Dora Intro Page</title><link rel="shortcut icon" href="./assets/img/favicon.ico">

<meta name="description" content="Doraemon Channel landing page with day and night themes, character animations, and a featured content slider." />
<meta name="keywords" content="Doraemon, landing page, anime portal, character animation, slider" />
<meta name="robots" content="index,follow" />


<!-- Optimized Assets -->
<link rel="stylesheet" type="text/css" href="assets/css/style.css">
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/jquery.nivo.slider.js"></script>
<script src="assets/js/script.js"></script>

</head>

<body>

<div id="headerBG">
<h1 id="headlogo">Doraemon Channel</h1>
<div id="header"></div>

<!-- Theme Toggle Button -->
<div id="themeToggle">
    <span id="themeToggleText">Toggle Theme</span>
</div>

<!-- Day Theme Elements (will be shown/hidden by JavaScript) -->
<div id="cloud1"><img src="assets/img/cloud.png" alt="Cloud illustration"></div>
<div id="cloud2"><img src="assets/img/cloud.png" alt="Cloud illustration"></div>
<div id="cloud3"><img src="assets/img/cloud.png" alt="Cloud illustration"></div>
<div id="cloud4"><img src="assets/img/cloud.png" alt="Cloud illustration"></div>
<div id="cloud5"><img src="assets/img/cloud.png" alt="Cloud illustration"></div>

<div id="minidora_day"><img src="assets/img/minidora.png" alt="Mini Doraemon floating"></div>
<div id="dora_day"><img src="assets/img/dora_michibiki.png" alt="Doraemon guiding pose"></div>
<div id="dorami_day"><img src="assets/img/dorami_bikkuri.png" alt="Dorami surprised"></div>

<!-- Night Theme Elements -->
<div id="dora_night"><img src="assets/img/dora_moon.png" alt="Doraemon watching the moon"></div>
<div id="dorami_night"><img src="assets/img/dorami_miage.png" alt="Dorami looking up at night sky"></div>
<div id="mood"><img src="assets/img/mood.gif" alt="Moon animation"></div>

<div id="header980">

<!-- Main Slider Content -->
<div id="flashContent">
<div class="slider-wrapper theme-default">
<div id="slider" class="nivoSlider">
<a href="#section1"><img src="assets/img/m3.jpg" alt="Doraemon Content 1" /></a>
<a href="#section2"><img src="assets/img/m0.jpg" alt="Doraemon Content 2" /></a>
<a href="#section3"><img src="assets/img/m1.jpg" alt="Doraemon Content 3" /></a>
<a href="#section4"><img src="assets/img/m2.jpg" alt="Doraemon Content 4" /></a>
</div>
<div id="channel"><img src="assets/img/channel.png" width="66" height="66" alt="Doraemon Channel icon"></div>
</div>
</div>

</div>

</div>

</body>
</html>
