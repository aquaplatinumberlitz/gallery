<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Intro Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px;
      animation: fadeIn 1s ease-out;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(45deg, #c9a962, #e8d5a3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      animation: pulse 2s infinite;
      box-shadow: 0 0 40px rgba(201, 169, 98, 0.4);
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      margin-bottom: 15px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #c9a962, #e8d5a3, #c9a962);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.2em;
      margin-bottom: 50px;
    }

    .enter-btn {
      padding: 15px 50px;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: transparent;
      border: 2px solid #c9a962;
      color: #c9a962;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .enter-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201, 169, 98, 0.2), transparent);
      transition: left 0.5s;
    }

    .enter-btn:hover::before {
      left: 100%;
    }

    .enter-btn:hover {
      background: #c9a962;
      color: #1a1a2e;
      box-shadow: 0 0 30px rgba(201, 169, 98, 0.5);
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(201, 169, 98, 0.5);
      border-radius: 50%;
      animation: float 15s infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% {
        transform: translateY(-100vh) rotate(720deg);
        opacity: 0;
      }
    }

    .footer {
      position: fixed;
      bottom: 30px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  
  <div class="container">
    <div class="logo">🎨</div>
    <h1>Gallery</h1>
    <p class="subtitle">Sample Test Page</p>
    <button class="enter-btn" onclick="enterGallery()">Enter Gallery</button>
  </div>

  <div class="footer">Sample Intro Page • Created for Testing</div>

  <script>
    // Create floating particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particle.style.animationDuration = (10 + Math.random() * 10) + 's';
      particlesContainer.appendChild(particle);
    }

    // Enter gallery function - communicates with parent Vue app
    function enterGallery() {
      // Try to communicate with parent window (Vue app)
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'enterGallery' }, '*');
      }
    }

    // Also allow clicking anywhere after 2 seconds
    setTimeout(() => {
      document.body.addEventListener('click', (e) => {
        if (e.target.tagName !== 'BUTTON') {
          enterGallery();
        }
      });
    }, 2000);
  </script>
</body>
</html>
