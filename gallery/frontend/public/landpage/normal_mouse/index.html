<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
<title>Dora Intro Page</title>
<meta name="description" content="3F Fansub interactive Doraemon landing page with day and night themes and theme toggle." />
<meta name="keywords" content="Doraemon, fansub, landing page, theme toggle, anime portal" />
<link rel="shortcut icon" href="./assets/img/favicon.ico">

<link rel="stylesheet" type="text/css" href="./assets/css/style.css">
<script src="./assets/js/jquery.min.js"></script>
<script src="./assets/js/jquery.nivo.slider.js"></script>
<script src="./assets/js/script.js"></script>
</head>

<body>

<div id="headerBG">
<h1 id="headlogo">3F Fansub Portal</h1>
<div id="header"></div>

<!-- Theme Toggle Button -->
<div id="themeToggle">
    <span id="themeToggleText">Toggle Theme</span>
</div>

<!-- Day Theme Elements - Clouds (inside headerBG, outside header980) -->
<div id="cloud1"><img src="./assets/img/cloud.png" alt="Cloud illustration"></div>
<div id="cloud2"><img src="./assets/img/cloud.png" alt="Cloud illustration"></div>
<div id="cloud3"><img src="./assets/img/cloud.png" alt="Cloud illustration"></div>
<div id="cloud4"><img src="./assets/img/cloud.png" alt="Cloud illustration"></div>
<div id="cloud5"><img src="./assets/img/cloud.png" alt="Cloud illustration"></div>

<div id="header980">

<!-- Day Theme Elements - Characters (inside header980) -->
<div id="minidora_day"><img src="./assets/img/minidora.png" alt="Mini Doraemon floating"></div>
<div id="dora_day"><img src="./assets/img/dora_michibiki.png" alt="Doraemon guiding pose"></div>
<div id="dorami_day"><img src="./assets/img/dorami_bikkuri.png" alt="Dorami surprised"></div>
<div id="mouse"><img src="./assets/img/mouse.png" alt="Mouse character"></div>

<!-- Night Theme Elements (inside header980) -->
<div id="dora_night"><img src="./assets/img/dora_moon.png" alt="Doraemon under the moon"></div>
<div id="dorami_night"><img src="./assets/img/dorami_miage.png" alt="Dorami looking up at night sky"></div>
<div id="mood"><img src="./assets/img/mood.gif" alt="Moon animation"></div>

<div id="flashContent">
<div class="slider-wrapper theme-default">
<div id="slider" class="nivoSlider">
<a href="#section1"><img src="./assets/img/m3.jpg" alt="Content 1" /></a>
<a href="#section2"><img src="./assets/img/m0.jpg" alt="Content 2" /></a>
<a href="#section3"><img src="./assets/img/m1.jpg" alt="Content 3" /></a>
<a href="#section4"><img src="./assets/img/m2.jpg" alt="Content 4" /></a>
</div>
</div>
</div>
</div>

</div>

<div class="w980">
<p class="floatClearMargin"></p>
</div>

<p class="floatClear"></p>

</body>
</html>
